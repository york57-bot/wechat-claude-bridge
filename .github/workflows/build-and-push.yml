name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          # ghcr.io packages use org-level API, not user-level
          # Try gh CLI first (it handles auth correctly)
          echo "Trying gh CLI..."
          gh api --method GET "user/packages?package_type=container" || true

          # The correct endpoint for GHCR visibility is:
          # PUT /orgs/{org}/packages/container/{package}/visibility
          # or for users: PATCH /user/packages/container/{package_name}/visibility
          # With GHCR, the "package_name" includes the namespace
          echo "Trying GHCR API..."
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/visibility" \
            -d '{"visibility":"public"}' || true
          echo "Done. If it didn't work, make public manually at: https://github.com/${{ github.repository_owner }}?tab=packages"
