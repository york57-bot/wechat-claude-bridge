name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Make package public
        run: |
          set -x
          PACKAGE="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"

          # Try user-scoped endpoint first, then org-scoped
          for endpoint in \
            "https://api.github.com/user/packages/container/${PACKAGE}/visibility" \
            "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE}/visibility"; do
            echo "Trying: $endpoint"
            RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "$endpoint" \
              -d '{"visibility":"public"}')
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "HTTP $HTTP_CODE: $BODY"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "204" ]; then
              echo "Package is now public!"
              exit 0
            fi
          done
          echo "Warning: Could not set package public via API. Check settings manually."
          exit 0
